{% set name = "tiatoolbox" %}
{% set version = "2.1.3" %}
{% set python_min = "3.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 72b21e1c59a9feb59690237d6a0d94f5181326c3f82851bf4c6d28395856adf8

build:
  number: 0

  # ----- WINDOWS UTF‑8 FIX -----
  # Windows defaults to cp1252, causing setuptools metadata decode failures.
  # Force UTF‑8 for pip / setuptools isolated builds.
  script: |
    set PYTHONUTF8=1        # [win]
    set PYTHONIOENCODING=utf-8  # [win]

    {{ PYTHON }} -m pip install . -vv
  # --------------------------------

  entry_points:
    - tiatoolbox=tiatoolbox.cli:main
  skip: true  # [py<311 or py>314]

requirements:
  host:
    - python
    - pip
    - pytest-runner
    - setuptools
    - wheel

  run:
    - aiohttp >=3.8.1,<=3.14.2
    - bokeh >=3.8.2,<=3.9.1
    - click >=8.2.0,<=8.4.2
    - dask >=2026.1.2,<2026.7.1
    - defusedxml >=0.7.1,<=0.7.1
    - filelock >=3.9.0,<3.29.0
    - flask >=2.2.2,<3.1.3
    - flask-cors >=4.0.0,<6.0.5
    - glymur >=0.12.7,<0.14.8
    - huggingface_hub >=0.33.3,<1.24.0
    - imagecodecs >=2022.9.26,<2026.3.6
    - ipywidgets >=8.1.7,<8.1.8
    - joblib >=1.1.1,<1.5.3
    - jupyterlab >=3.5.2,<4.6.1
    - matplotlib-base >=3.6.2,<3.11.1
    - numba >=0.57.0,<0.66.0
    - numpy >=2.0.0,<2.4.4
    - opencv >=4.6.0,<5.0.0
    - openjpeg >=2.4.0,<=2.5.4
    - openslide
    - openslide-python >=1.4.0,<1.4.6
    - pandas >=2.0.0,<3.0.3
    - pillow >=9.3.0,<12.2.0
    - pixman >=0.39.0  # [linux]
    - pydicom >=2.3.1,<3.0.2
    - python
    - pytorch >=2.0.0,<2.13.0
    - pyyaml >=6.0,<6.0.3
    - requests >=2.28.1,<2.34.2
    - s3fs >=2024.12.0,<2026.6.0
    - scikit-image >=0.20,<0.26.1
    - scikit-learn >=1.2.0,<1.9.0
    - scipy >=1.8,<1.17.1
    - shapely >=2.0.0,<=2.1.2
    - SimpleITK >=2.2.1,<2.5.5
    - sphinx >=9.0.0,<9.0.4
    - tifffile >=2022.10.10,<=2026.3.3
    - timm >=1.0.3,<1.0.28
    - torchvision >=0.15.0,<0.28.0
    - tqdm >=4.64.1,<4.69.0
    - transformers >=4.51.1,<5.14.1
    - umap-learn >=0.5.3,<0.5.12
    - wsidicom >=0.18.0,<0.34.0
    - zarr >=3.0.8,<3.2.0

test:
  requires:
    - pip
    - python
    - simsimd >=7.0.0,<=7.7.0
    - albucore <=0.0.28
  imports:
    - tiatoolbox
    - tiatoolbox.annotation
    - tiatoolbox.models.engine.multi_task_segmentor
  commands:
    - tiatoolbox --help

about:
  home: https://github.com/TissueImageAnalytics/tiatoolbox
  summary: Computational pathology toolbox developed by TIA Lab.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
    - shaneahmed
    - John-P

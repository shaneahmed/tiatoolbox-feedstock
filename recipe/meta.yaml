{% set name = "tiatoolbox" %}
{% set version = "2.0.0" %}
{% set python_min = "3.10" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7ae32e0d3b1f923e7d2d95480394724b1440c42350c29d3a5e78f6507561b90d

build:
  number: 0

  # ----- WINDOWS UTF‑8 FIX -----
  # Windows defaults to cp1252, causing setuptools metadata decode failures.
  # Force UTF‑8 for pip / setuptools isolated builds.
  script: |
    set PYTHONUTF8=1        # [win]
    set PYTHONIOENCODING=utf-8  # [win]

    {{ PYTHON }} -m pip install . -vv
  # --------------------------------

  entry_points:
    - tiatoolbox=tiatoolbox.cli:main
  skip: true  # [py<310 or py>313]

requirements:
  host:
    - python
    - pip
    - pytest-runner
    - setuptools
    - wheel

  run:
    - albumentations >=1.3.0,<=2.0.8
    - bokeh >=3.8.2,<=3.8.2
    - click >=8.2.0,<=8.3.1
    - dask >=2026.1.2,<=2026.1.2
    - defusedxml >=0.7.1,<=0.7.1
    - filelock >=3.9.0,<=3.20.0
    - flask >=2.2.2,<=3.1.3
    - flask-cors >=4.0.0,<=6.0.2
    - glymur >=0.12.7,<=0.14.7
    - huggingface_hub >=0.33.3,<=1.6.0
    - imagecodecs >=2022.9.26,<=2026.3.6
    - ipywidgets >=8.1.7,<=8.1.8
    - joblib >=1.1.1,<=1.5.3
    - jupyterlab >=3.5.2,<=4.5.6
    - matplotlib-base >=3.6.2,<=3.10.8
    - numba >=0.57.0,<=0.64.0
    - numpy >=2.0.0,<=2.4.3
    - opencv >=4.6.0,<=4.13.0
    - openjpeg >=2.4.0,<=2.5.4
    - openslide
    - openslide-python >=1.4.0,<=1.4.3
    - pandas >=2.0.0,<=3.0.1
    - pillow >=9.3.0,<=12.0.0
    - pixman >=0.39.0,<=0.46.4  # [linux]
    - pydicom >=2.3.1,<=3.0.1
    - python
    - pytorch >=2.0.0,<=2.10.0
    - pyyaml >=6.0,<=6.0.3
    - requests >=2.28.1,<=2.32.5
    - scikit-image >=0.20,<=0.26.0
    - scikit-learn >=1.2.0,<=1.8.0
    - scipy >=1.8,<=1.17.1
    - shapely >=2.0.0,<=2.1.2
    - SimpleITK >=2.2.1,<=2.5.3
    - sphinx >=5.3.0,<=9.1.0
    - tifffile >=2022.10.10,<=2025.5.10
    - timm >=1.0.3,<=1.0.25
    - torchvision >=0.15.0,<=0.25.0
    - tqdm >=4.64.1,<=4.67.3
    - transformers >=4.51.1,<=5.3.0
    - umap-learn >=0.5.3,<=0.5.11
    - wsidicom >=0.18.0,<=0.29.0
    - zarr >=2.13.3,<=2.18.7

test:
  imports:
    - tiatoolbox
    - tiatoolbox.annotation
    - tiatoolbox.models.engine.multi_task_segmentor
  commands:
    - tiatoolbox --help
  requires:
    - pip
    - python

about:
  home: https://github.com/TissueImageAnalytics/tiatoolbox
  summary: Computational pathology toolbox developed by TIA Lab.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
    - shaneahmed
    - John-P
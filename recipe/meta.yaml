{% set name = "tiatoolbox" %}
{% set version = "2.1.1" %}
{% set python_min = "3.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: cc079c989d0493261dcf2e9dba5163be756ae3ad0725946aba37d145e65e06d7

build:
  number: 0

  # ----- WINDOWS UTF‑8 FIX -----
  # Windows defaults to cp1252, causing setuptools metadata decode failures.
  # Force UTF‑8 for pip / setuptools isolated builds.
  script: |
    set PYTHONUTF8=1        # [win]
    set PYTHONIOENCODING=utf-8  # [win]

    {{ PYTHON }} -m pip install . -vv
  # --------------------------------

  entry_points:
    - tiatoolbox=tiatoolbox.cli:main
  skip: true  # [py<311 or py>314]

requirements:
  host:
    - python
    - pip
    - pytest-runner
    - setuptools
    - wheel

  run:
    - albumentations >=1.3.0,<=1.4.20
    - bokeh >=3.8.2,<=3.9.0
    - click >=8.2.0,<=8.4.0
    - dask >=2026.1.2,<=2026.3.0
    - defusedxml >=0.7.1,<=0.7.1
    - filelock >=3.9.0,<=3.29.0
    - flask >=2.2.2,<=3.1.3
    - flask-cors >=4.0.0,<=6.0.2
    - glymur >=0.12.7,<=0.14.8
    - huggingface_hub >=0.33.3,<=1.15.0
    - imagecodecs >=2022.9.26,<=2026.5.10
    - ipywidgets >=8.1.7,<=8.1.8
    - joblib >=1.1.1,<=1.5.3
    - jupyterlab >=3.5.2,<=4.5.7
    - matplotlib-base >=3.6.2,<=3.10.9
    - numba >=0.57.0,<=0.65.1
    - numpy >=2.0.0,<=2.4.4
    - opencv >=4.6.0,<=4.13.0
    - openjpeg >=2.4.0,<=2.5.4
    - openslide
    - openslide-python >=1.4.0,<=1.4.3
    - pandas >=2.0.0,<=3.0.3
    - pillow >=9.3.0,<=12.2.0
    - pixman >=0.39.0  # [linux]
    - pydicom >=2.3.1,<=3.0.2
    - python
    - pytorch >=2.0.0,<=2.12.0
    - pyyaml >=6.0,<=6.0.3
    - requests >=2.28.1,<=2.34.2
    - scikit-image >=0.20,<=0.26.0
    - scikit-learn >=1.2.0,<=1.8.0
    - scipy >=1.8,<=1.17.1
    - shapely >=2.0.0,<=2.1.2
    - simsimd >=7.0.0,<=7.6.0
    - SimpleITK >=2.2.1,<=2.5.5
    - sphinx >=5.3.0,<9.0.0
    - tifffile >=2022.10.10,<=2026.5.15
    - timm >=1.0.3,<=1.0.27
    - torchvision >=0.15.0,<=0.27.0
    - tqdm >=4.64.1,<=4.67.3
    - transformers >=4.51.1,<=5.8.1
    - umap-learn >=0.5.3,<=0.5.12
    - wsidicom >=0.18.0,<=0.29.0
    - zarr >=3.0.8,<=3.2.1

test:
  imports:
    - tiatoolbox
    - tiatoolbox.annotation
    - tiatoolbox.models.engine.multi_task_segmentor
  commands:
    - tiatoolbox --help
  requires:
    - pip
    - python
    - simsimd

about:
  home: https://github.com/TissueImageAnalytics/tiatoolbox
  summary: Computational pathology toolbox developed by TIA Lab.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
    - shaneahmed
    - John-P
